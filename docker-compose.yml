services:
  whatsapp-api:
    build:
      context: ./docker/whatsapp-api
      dockerfile: Dockerfile
    container_name: whatsapp-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - AUTHENTICATION_API_KEY=PM5-SuperSecret-Key-2026
    # Sin volumen persistente para evitar bloqueo de perfil